name: Deploy CF Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - "deploy_workers.py"
      - ".github/workflows/deploy-cf-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python deploy_workers.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RELAY_SECRET: ${{ secrets.RELAY_SECRET }}
