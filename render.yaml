services:
  - type: web
    name: iptv-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    # 1 worker + 8 threads = shared in-process cache (one prefetch loop, no duplicate upstream fetches)
    # gthread worker class allows concurrent requests without GIL contention on I/O
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 8 --timeout 120 --keep-alive 5
    plan: free
    envVars:
      - key: COLATV_FRONTEND
        value: https://colatv48.live
      - key: COLATV_API
        value: https://api.cltvlv.com/api/matches
      - key: PHAOHOA_FRONTEND
        value: https://phaohoa1.live
      - key: PHAOHOA_API
        value: https://phaohoa1.live/api/matches/
      - key: MATCH_MAX_DURATION
        value: "7200"
